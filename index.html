<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Analizador de capacidad de crédito</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #ffffff; --bg2: #f6f6f4; --bg3: #eeede9;
    --border: rgba(0,0,0,0.11); --border2: rgba(0,0,0,0.20);
    --text: #1a1a18; --text2: #5a5a56; --text3: #9a9a94;
    --blue-bg: #e6f1fb; --blue-border: rgba(24,95,165,0.28); --blue-text: #0c447c;
    --green-bg: #eaf3de; --green-border: rgba(59,109,17,0.28); --green-text: #27500a;
    --amber-bg: #faeeda; --amber-border: rgba(133,79,11,0.28); --amber-text: #633806;
    --red-bg: #fcebeb; --red-border: rgba(163,45,45,0.28); --red-text: #791f1f;
    --radius: 8px; --radius-lg: 12px;
    --good: #1D9E75; --ok: #BA7517; --bad: #E24B4A;
  }
  body { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; font-size: 14px; color: var(--text); background: var(--bg3); min-height: 100vh; padding: 24px 20px; }
  .wrap { max-width: 940px; margin: 0 auto; }
  h1 { font-size: 20px; font-weight: 600; margin-bottom: 3px; }
  .subtitle { font-size: 13px; color: var(--text2); margin-bottom: 20px; }

  .card { background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 16px 18px; margin-bottom: 10px; }
  .sec-label { font-size: 10px; font-weight: 700; color: var(--text3); text-transform: uppercase; letter-spacing: .07em; display: block; margin-bottom: 12px; }
  .divider { border-top: 0.5px solid var(--border); margin: 14px 0; }

  label { display: block; font-size: 12px; color: var(--text2); margin-bottom: 4px; }
  .hint { font-size: 11px; color: var(--text3); margin-top: 3px; }
  input, select, textarea {
    width: 100%; border: 0.5px solid var(--border2); border-radius: var(--radius);
    background: var(--bg); color: var(--text); font-size: 13px;
    padding: 0 10px; font-family: inherit; outline: none;
    transition: border-color .15s, box-shadow .15s;
  }
  input, select { height: 34px; }
  textarea { padding: 8px 10px; resize: vertical; min-height: 86px; line-height: 1.55; }
  input:focus, select:focus, textarea:focus { border-color: #378add; box-shadow: 0 0 0 2px rgba(55,138,221,.14); }
  input.mono { font-family: 'Courier New', monospace; }
  .field { margin-bottom: 10px; }
  .field:last-child { margin-bottom: 0; }

  .income-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }

  .types-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 14px; }
  .type-btn { background: var(--bg2); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 10px 10px 9px; cursor: pointer; text-align: left; font-family: inherit; width: 100%; transition: border .12s, background .12s; }
  .type-btn:hover { border-color: var(--border2); background: var(--bg); }
  .type-btn.active { background: var(--blue-bg); border: 1px solid var(--blue-border); }
  .tbadge { display: inline-flex; align-items: center; justify-content: center; width: 24px; height: 24px; border-radius: 50%; font-size: 9px; font-weight: 700; font-family: 'Courier New', monospace; background: var(--bg3); color: var(--text2); margin-bottom: 6px; }
  .type-btn.active .tbadge { background: var(--bg); color: var(--blue-text); }
  .tname { font-size: 13px; font-weight: 600; color: var(--text); display: block; margin-bottom: 2px; }
  .type-btn.active .tname { color: var(--blue-text); }
  .tdesc { font-size: 11px; color: var(--text3); display: block; }
  .type-btn.active .tdesc { color: var(--blue-text); opacity: .75; }

  .two-col { display: grid; grid-template-columns: minmax(0,1fr) minmax(0,1fr); gap: 14px; align-items: start; }

  .commit-header { display: grid; grid-template-columns: 1fr 110px 105px 32px; gap: 6px; margin-bottom: 6px; padding: 0 2px; }
  .commit-header span { font-size: 11px; color: var(--text3); font-weight: 600; }
  .commit-row { display: grid; grid-template-columns: 1fr 110px 105px 32px; gap: 6px; align-items: center; margin-bottom: 7px; }
  .commit-row:last-child { margin-bottom: 0; }
  .btn-rm { width: 32px; height: 34px; border: 0.5px solid var(--border2); border-radius: var(--radius); background: var(--bg2); cursor: pointer; color: var(--text3); display: flex; align-items: center; justify-content: center; transition: background .12s, color .12s; flex-shrink: 0; }
  .btn-rm:hover { background: var(--red-bg); color: var(--red-text); border-color: var(--red-border); }
  .btn-add { background: transparent; border: 0.5px dashed var(--border2); border-radius: var(--radius); padding: 8px; font-size: 12px; color: var(--text2); cursor: pointer; font-family: inherit; width: 100%; margin-top: 10px; display: flex; align-items: center; gap: 5px; justify-content: center; transition: background .12s; }
  .btn-add:hover { background: var(--bg2); }
  .commit-total-row { display: flex; justify-content: flex-end; align-items: center; gap: 10px; margin-top: 10px; padding-top: 10px; border-top: 0.5px solid var(--border); }
  .commit-total-row span { font-size: 12px; color: var(--text2); }
  .commit-total-val { font-family: 'Courier New', monospace; font-size: 15px; font-weight: 600; color: var(--text); }

  .btn-analyze { width: 100%; height: 40px; border-radius: var(--radius); border: 0.5px solid var(--blue-border); background: var(--blue-bg); color: var(--blue-text); font-size: 14px; font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 7px; font-family: inherit; transition: opacity .15s; }
  .btn-analyze:hover:not(:disabled) { opacity: .84; }
  .btn-analyze:disabled { opacity: .45; cursor: not-allowed; }

  .metrics-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 12px; }
  .metric-box { background: var(--bg2); border-radius: var(--radius); padding: 12px 14px; }
  .metric-box .ml { font-size: 11px; color: var(--text2); margin-bottom: 4px; }
  .metric-box .mv { font-family: 'Courier New', monospace; font-size: 21px; font-weight: 600; }

  .cap-table { width: 100%; border-collapse: collapse; font-size: 13px; }
  .cap-table td { padding: 7px 0; border-top: 0.5px solid var(--border); }
  .cap-table tr:first-child td { border-top: none; }
  .td-label { color: var(--text2); padding-right: 8px; }
  .td-val { text-align: right; font-family: 'Courier New', monospace; white-space: nowrap; }

  .dti-wrap { margin-top: 12px; }
  .dti-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; }
  .dti-header span { font-size: 11px; color: var(--text2); }
  .dti-track { height: 7px; background: var(--border); border-radius: 4px; overflow: hidden; }
  .dti-fill { height: 100%; border-radius: 4px; }
  .dti-ticks { display: flex; justify-content: space-between; margin-top: 3px; }
  .dti-ticks span { font-size: 10px; color: var(--text3); }

  .dict-card { border-radius: var(--radius-lg); padding: 16px 18px; }
  .dict-main { display: flex; align-items: flex-start; gap: 10px; }
  .dict-title { font-size: 16px; font-weight: 600; }
  .dict-sub { font-size: 12px; margin-top: 4px; opacity: .8; }
  .ai-body { font-size: 13px; line-height: 1.65; white-space: pre-wrap; margin-top: 12px; opacity: .87; }
  .ai-loading { display: flex; align-items: center; gap: 7px; margin-top: 12px; font-size: 13px; opacity: .7; }

  .btn-save { width: 100%; height: 36px; border-radius: var(--radius); border: 0.5px solid var(--border2); background: var(--bg2); color: var(--text); font-size: 13px; font-weight: 500; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 6px; font-family: inherit; transition: background .12s; }
  .btn-save:hover:not(:disabled) { background: var(--bg3); }
  .btn-save:disabled { opacity: .45; cursor: not-allowed; }
  .save-msg { font-size: 12px; margin-top: 8px; display: flex; align-items: center; gap: 5px; }

  .empty-state { text-align: center; padding: 4rem 2rem; border: 0.5px dashed var(--border2); border-radius: var(--radius-lg); }
  .empty-state i { font-size: 40px; color: var(--text3); display: block; margin-bottom: 12px; }
  .empty-state p { color: var(--text3); font-size: 13px; line-height: 1.7; }
  .empty-state strong { color: var(--text2); font-weight: 500; }

  .url-card { background: var(--bg2); border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 14px 18px; margin-bottom: 14px; }
  .url-row { display: flex; gap: 8px; align-items: center; margin-top: 6px; }
  .url-row input { flex: 1; font-family: 'Courier New', monospace; font-size: 12px; }
  .url-ok { font-size: 11px; color: var(--green-text); white-space: nowrap; display: none; align-items: center; gap: 3px; }
  .obs-card { margin-top: 10px; }
  .btn-pdf { width:100%; height:36px; border-radius:var(--radius); border:0.5px solid rgba(35,107,107,0.35); background:#e8f4f4; color:#1a6060; font-size:13px; font-weight:500; cursor:pointer; display:flex; align-items:center; justify-content:center; gap:6px; font-family:inherit; transition:background .12s; margin-bottom:8px; }
  .btn-pdf:hover { background:#d4ecec; }

  @media print {
    @page { margin: 18mm 16mm; size: A4; }
    body { background:#fff !important; padding:0 !important; font-size:12px; color:#111; }
    .wrap { max-width:100%; }
    #mainContent .two-col { display:block !important; }
    #leftCol, .types-grid, h1.page-title, .subtitle, .btn-analyze, .btn-save, .btn-pdf, #saveMsg, .save-card { display:none !important; }
    #rightCol { display:block !important; width:100% !important; }
    .card { border:0.5px solid #ccc !important; break-inside:avoid; margin-bottom:10px; padding:12px 14px; }
    .metric-box { background:#f4f4f4 !important; }
    .monto-card { background:#e6f1fb !important; }
    .dict-card { break-inside:avoid; }
    .no-print { display:none !important; }
    .print-only { display:block !important; }
    .dti-track { background:#ddd !important; }
  }
</style>
</head>
<body>
<div class="wrap">

  <div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:20px;">
    <div>
      <h1 class="page-title" style="margin-bottom:3px;">Analizador de capacidad de crédito</h1>
      <p class="subtitle" style="margin-bottom:0;">Filtro de candidatura · capacidad de pago · compromisos financieros</p>
    </div>
    <div style="display:flex;align-items:center;gap:10px;flex-shrink:0;">
      <img id="appLogo" style="width:52px;height:52px;object-fit:contain;" alt="Finarq">
      <div style="text-align:left;">
        <div style="font-size:18px;font-weight:800;color:#1a5f5f;letter-spacing:.08em;line-height:1;">FINARQ</div>
        <div style="font-size:9px;color:#5a8a8a;letter-spacing:.07em;margin-top:3px;font-weight:600;">ARQUITECTURA FINANCIERA</div>
      </div>
    </div>
  </div>

  <!-- Header visible solo en impresión -->
  <div class="print-only" id="printHeader" style="display:none;"></div>

  <div class="types-grid" id="typesGrid"></div>

  <div id="mainContent" style="display:none;">
    <div class="two-col">
      <div id="leftCol"></div>
      <div id="rightCol">
        <div class="empty-state">
          <i class="ti ti-file-analytics"></i>
          <p>Selecciona el tipo de persona, captura los datos<br>y presiona <strong>Analizar candidatura</strong></p>
        </div>
      </div>
    </div>
  </div>

</div>

let currentType=null;
let fData={nombre:"",mop:""};
let ingresos=["","","","","",""];
let commits=[{tipo:"",banco:"",monto:""}];
let obs="";
let otrosIngresos="";
let lastR=null, lastAI="";

const nv=v=>parseFloat(String(v).replace(/,/g,""))||0;
const fmt=v=>isNaN(v)||v==null?"—":new Intl.NumberFormat("es-MX",{style:"currency",currency:"MXN",maximumFractionDigits:0}).format(v);
const pct=v=>v!=null?(v*100).toFixed(1)+"%":"—";
const totalCommits=()=>commits.reduce((s,c)=>s+nv(c.monto),0);

function calcAnalysis(){
  const avgBase=ingresos.reduce((s,v)=>s+nv(v),0)/6;
  const avg=avgBase+nv(otrosIngresos);
  const totalP=totalCommits();
  const neta=Math.max(0,avg-totalP);
  const dti=avg>0?totalP/avg:0;
  const mop=parseInt(fData.mop)||1;
  let candidato,dtype;
  if(neta<=0||dti>=0.50){candidato="No candidato";dtype="danger";}
  else if(dti>=0.35||mop>=4){candidato="Análisis adicional";dtype="warning";}
  else{candidato="Candidato";dtype="success";}
  const estimacion=neta>0?(neta/25000)*1000000:0;
  return{avg,avgBase,neta,totalP,dti,mop,candidato,dtype,estimacion};
}

function incomeTitle(){
  return{
    ASALARIADO:"Ingresos netos — últimos 6 meses",
    PF:"Ingresos mensuales — últimos 6 meses",
    PFAE:"Depósitos en cuenta (estado de cuenta) — últimos 6 meses",
    PM:"Depósitos en cuenta (estado de cuenta) — últimos 6 meses",
  }[currentType];
}
function incomeHint(){
  return{
    ASALARIADO:"Ingreso neto después de IMSS e ISR",
    PF:"Ingresos por honorarios, actividades profesionales o rentas",
    PFAE:"Depósitos totales recibidos en el estado de cuenta del período",
    PM:"Ingresos o ventas del mes correspondiente",
  }[currentType];
}

function renderLeft(){
  const incGrid=MESES.map((m,i)=>`
    <div class="field" style="margin:0;">
      <label>${m} ($)</label>
      <input type="text" class="mono" value="${ingresos[i]}" inputmode="numeric"
        oninput="ingresos[${i}]=this.value;refreshTotals()">
    </div>`).join("");

  const cHeader=`<div class="commit-header">
    <span>Tipo de compromiso</span><span>Institución / banco</span>
    <span style="text-align:right;">Mensualidad ($)</span><span></span>
  </div>`;

  const cRows=commits.map((c,i)=>`
    <div class="commit-row">
      <select onchange="commits[${i}].tipo=this.value">
        <option value="">Tipo...</option>
        ${COMMIT_TYPES.map(o=>`<option${c.tipo===o?" selected":""}>${o}</option>`).join("")}
      </select>
      <input type="text" placeholder="Ej: BBVA" value="${c.banco}"
        oninput="commits[${i}].banco=this.value">
      <input type="text" class="mono" placeholder="0" value="${c.monto}" inputmode="numeric"
        style="text-align:right;" oninput="commits[${i}].monto=this.value;refreshTotals()">
      <button class="btn-rm" onclick="removeCommit(${i})" title="Eliminar fila">
        <i class="ti ti-x" style="font-size:13px;"></i>
      </button>
    </div>`).join("");

  document.getElementById("leftCol").innerHTML=`
  <div class="card">
    <span class="sec-label">Datos del solicitante</span>
    <div class="field">
      <label>Nombre completo / Razón social</label>
      <input type="text" value="${fData.nombre}" oninput="fData.nombre=this.value">
    </div>
    <div class="field" style="margin-bottom:0;">
      <label>MOP máximo reportado en buró (1–9)</label>
      <input type="text" class="mono" value="${fData.mop}" inputmode="numeric"
        placeholder="1 = al corriente · 9 = pérdida" oninput="fData.mop=this.value">
      <p class="hint">Dato extraído del reporte del buró de crédito del cliente</p>
    </div>
  </div>

  <div class="card">
    <span class="sec-label">${incomeTitle()}</span>
    <p class="hint" style="margin-bottom:12px;">${incomeHint()}</p>
    <div class="income-grid">${incGrid}</div>
    <div class="divider"></div>
    <div class="field" style="margin-bottom:10px;">
      <label>Otros ingresos comprobables <span style="font-weight:400;color:var(--text3);">opcional</span></label>
      <input type="text" class="mono" value="${otrosIngresos}" inputmode="numeric"
        placeholder="Ej: rentas, pensiones, remesas..." oninput="otrosIngresos=this.value;refreshTotals()">
      <p class="hint">Se suma al promedio mensual de los 6 meses</p>
    </div>
    <div class="divider"></div>
    <div style="display:flex;justify-content:space-between;align-items:center;">
      <span style="font-size:12px;color:var(--text2);">Ingreso promedio total mensual</span>
      <span id="avgDisp" style="font-family:'Courier New',monospace;font-size:14px;font-weight:600;">—</span>
    </div>
  </div>

  <div class="card">
    <span class="sec-label">Compromisos y obligaciones financieras</span>
    ${cHeader}
    <div id="cRows">${cRows}</div>
    ${commits.length<6?`<button class="btn-add" onclick="addCommit()">
      <i class="ti ti-plus" style="font-size:13px;"></i> Agregar compromiso
    </button>`:""}
    <div class="commit-total-row">
      <span>Total compromisos mensuales</span>
      <span class="commit-total-val" id="totDisp">—</span>
    </div>
  </div>

  <div class="card">
    <span class="sec-label">Observaciones</span>
    <textarea placeholder="Notas adicionales, condiciones especiales, contexto del cliente..."
      oninput="obs=this.value">${obs}</textarea>
  </div>

  <button class="btn-analyze" onclick="doAnalyze()">
    <i class="ti ti-search" style="font-size:16px;"></i> Analizar candidatura
  </button>`;

  refreshTotals();
}

function refreshTotals(){
  const avgBase=ingresos.reduce((s,v)=>s+nv(v),0)/6;
  const avg=avgBase+nv(otrosIngresos);
  const tot=totalCommits();
  const avgEl=document.getElementById("avgDisp");
  const totEl=document.getElementById("totDisp");
  if(avgEl) avgEl.textContent=avg>0?fmt(avg):"—";
  if(totEl) totEl.textContent=tot>0?fmt(tot):"—";
}

function addCommit(){
  if(commits.length>=6) return;
  commits.push({tipo:"",banco:"",monto:""});
  renderLeft();
}
function removeCommit(i){
  commits.splice(i,1);
  if(commits.length===0) commits.push({tipo:"",banco:"",monto:""});
  renderLeft();
}

function pickType(id){
  currentType=id;
  fData={nombre:"",mop:""};
  ingresos=["","","","","",""];
  commits=[{tipo:"",banco:"",monto:""}];
  obs=""; otrosIngresos=""; lastR=null; lastAI="";
  document.getElementById("mainContent").style.display="block";
  document.querySelectorAll(".type-btn").forEach(b=>b.classList.toggle("active",b.dataset.id===id));
  renderLeft();
  document.getElementById("rightCol").innerHTML=`<div class="empty-state">
    <i class="ti ti-file-analytics"></i>
    <p>Ingresa los datos del solicitante<br>y presiona <strong>Analizar candidatura</strong></p>
  </div>`;
}

async function doAnalyze(){
  const r=calcAnalysis();
  lastR=r;
  renderRight(r,"",true);

  const tl={ASALARIADO:"Asalariado",PF:"Persona Física",PFAE:"PFAE",PM:"Persona Moral"}[currentType];
  const cList=commits.filter(c=>nv(c.monto)>0).map(c=>`- ${c.tipo||"Compromiso"}${c.banco?" ("+c.banco+")":""}: ${fmt(nv(c.monto))}/mes`).join("\n")||"Sin compromisos registrados";
  const prompt=`Eres un asesor financiero profesional de Finarq. Redacta la conclusión de un análisis de crédito para incluir en un documento formal que se entregará al cliente. Escribe UN solo párrafo de máximo 5 oraciones. Reglas estrictas:\n- Usa primera persona del plural ("hemos", "consideramos", "estimamos") como si Finarq hablara institucionalmente\n- NO menciones montos de ingresos ni de compromisos\n- SÍ menciona la estimación de crédito autorizado: ${fmt(r.estimacion)}\n- Usa lenguaje profesional, cálido pero prudente — sin comprometer ni garantizar nada, ya que la decisión final es de la institución financiera\n- No uses frases como "nos permite ofrecerle condiciones favorables" ni asegures aprobación\n- Si es candidato: indica que el perfil es favorable para ser referido, menciona el monto estimado y aclara que está sujeto a evaluación\n- Si no es candidato o requiere análisis: explica de forma constructiva lo que se observa y qué podría mejorar\n- No incluyas encabezados, listas ni firmas\n\nDatos del análisis:\nNombre: ${fData.nombre||"el solicitante"}\nTipo de persona: ${tl}\nNivel de endeudamiento (DTI): ${pct(r.dti)}\nCapacidad de pago disponible: ${fmt(r.neta)}/mes\nEstimación de crédito autorizado: ${fmt(r.estimacion)}\nMOP máximo en buró: ${r.mop}\nDictamen: ${r.candidato}`;

  try{
    if(!SCRIPT_URL){ lastAI="URL del Apps Script no configurada."; renderRight(r,lastAI,false); return; }
    const res=await fetch(SCRIPT_URL,{method:"POST",body:JSON.stringify({prompt})});
    const js=await res.json();
    lastAI=js.texto||js.error||"Sin respuesta.";
  }catch{ lastAI="Error al conectar con el Apps Script. Verifica que la URL sea correcta y que el script esté publicado."; }
  renderRight(r,lastAI,false);
}

async function doSave(){
  const url=SCRIPT_URL;
  const msg=id=>document.getElementById(id);
  if(!url){msg("saveMsg").innerHTML=`<span class="save-msg" style="color:var(--amber-text);"><i class="ti ti-alert-triangle" style="font-size:12px;"></i> Pega primero la URL de tu Apps Script.</span>`;return;}
  if(!lastR){msg("saveMsg").innerHTML=`<span class="save-msg" style="color:var(--amber-text);"><i class="ti ti-alert-triangle" style="font-size:12px;"></i> Realiza primero un análisis.</span>`;return;}
  const btn=document.getElementById("saveBtn");
  btn.disabled=true;
  btn.innerHTML=`<i class="ti ti-loader-2" style="font-size:14px;"></i> Guardando...`;
  const tl={ASALARIADO:"Asalariado",PF:"Persona Física",PFAE:"PFAE",PM:"Persona Moral"}[currentType];
  const payload={
    nombre:fData.nombre||"",tipo:tl,mop:fData.mop||"",
    i1:nv(ingresos[0]),i2:nv(ingresos[1]),i3:nv(ingresos[2]),
    i4:nv(ingresos[3]),i5:nv(ingresos[4]),i6:nv(ingresos[5]),
    otrosIngresos:nv(otrosIngresos),
    promedio:lastR.avg,
    totalCompromisos:lastR.totalP,capacidadNeta:lastR.neta,
    dti:pct(lastR.dti),dictamen:lastR.candidato,estimacion:lastR.estimacion,
    compromisos:commits.filter(c=>nv(c.monto)>0).map(c=>`${c.tipo||""}${c.banco?" ("+c.banco+")":""}: $${nv(c.monto)}`).join(" | "),
    observaciones:obs,analisisIA:lastAI
  };
  try{
    await fetch(url,{method:"POST",mode:"no-cors",body:JSON.stringify(payload)});
    document.getElementById("saveMsg").innerHTML=`<span class="save-msg" style="color:var(--green-text);"><i class="ti ti-circle-check" style="font-size:12px;"></i> Enviado correctamente a tu hoja de cálculo.</span>`;
  }catch{
    document.getElementById("saveMsg").innerHTML=`<span class="save-msg" style="color:var(--red-text);"><i class="ti ti-alert-circle" style="font-size:12px;"></i> Error de conexión. Verifica la URL del script.</span>`;
  }
  btn.disabled=false;
  btn.innerHTML=`<i class="ti ti-table-export" style="font-size:15px;"></i> Guardar resultado en Sheets`;
}
